body:
  text: 卷二南狩賦並見北齊書魏收傳亡聘遊賦並見北齊書魏收傳亡皇居新殿臺賦並見北齊書魏收傳亡懷離賦並見北齊書魏收傳亡庭竹賦並見北齊書魏收傳亡為魏孝靜帝伐元神和等詔門下向背有禍福之機誅賞為威勸之本軌物成務咸必由之侯景擢自凡猥名行無聞僥幸時來謬見收試狡猾反覆唯利是從往事爾朱偏受榮遇一朝去就罔顧昔恩趌蹶輕動志在姦詐朝廷棄瑕藏穢仍蒙令引庶其梟音可革取其行間之用位踰其量過延寵祿藉我風雲遂成鱗羽入列鼎臣出裁節將勳無可紀才不足徵而淺器遽盈知小謀大謂己功名難居物下曾不知狐假虎威蛇憑霧積苞藏禍心潛圖不軌因總戎之際乘專任之機擁逼兵衆構釁南服此乃懦夫扼腕之日義士切齒之秋凡在人倫孰不憤慨而前楊州刺史元神和何悅張慶壽王黑醜宮延和王貴顯侯仙劉崇信張業等九人並以賤蔑名汙朝簡了無犬馬之識便有梟獍之心密相影響贊成姦逆隨託豺狼長茲蛇虺欣其位署委質驅馳甘厥鉤餌效以死力東西殘掠毒被村塢扇合蛾蟻終此亂階叛恩背德莫此之甚雖蹈名義事非小人而申禁垂法國有恆典其此九家並可從憲孥戮之科理無攸捨自餘拘縶詿誤之徒既懼死俯眉情非樂禍宜疏天網一原不問固使逆節知汙薦之制傾側獲自安之所文館詞林為孝靜帝下詔禪位為孝靜帝下詔禪位三才剖判百王代興治天靜地和神敬鬼庇民造物咸自靈符非一人之大寶實有道之神器昔我宗祖應運奄一區宇歷聖重光暨于九葉德之不嗣仍離屯圮盜名字者遍于九服擅制命者非止三公主殺朝危人神靡繫天下之大將非魏有賴齊獻武王奮揚靈武剋翦多難重懸日月更綴參辰廟以掃除國由再造鴻勳巨業無德而稱逮文襄承搆世業逾廣邇安遠服海內晏如國命已康生生得性迄相國齊王緯文經武統茲大業盡睿窮幾研深測化思隨冥運智與神行恩比春天威同夏日坦至心于萬物被大道于八方故百僚師師朝無粃政網疏澤洽率土歸心外盡江淮風靡屈膝辟地懷人百城奔走關隴慕義而請好瀚漠仰德而致誠伊所謂命世應期實撫千載禎符雜遝異物同途謳頌填委殊方一致代終之迹斯表人靈之契已合天道不遠我不獨知朕入纂鴻休將承世祀藉援立之厚延宗社之算靜言大運欣于避賢遠惟唐虞禪代之典近想魏晉揖讓之風其可昧興替之禮稽神祇之望今便遜于別宮歸帝位于齊國推聖與能眇符前軌主者宣布天下以時施行北齊書文宣紀為文宣帝出師詔為文宣帝出師詔朕曆數在躬志清四海蕞爾秦隴久阻風化混一之事期在今日必當訓旅誓衆天動雲臨朕已下木汾流成船晉地便當躬先將士汛入玉璧徑掩長安梟彼凶首朕與梁國舊好敦睦聞其姦計乃欲規謀宜令上黨王渙總勒熊羆星流風捲王者之言明如日月宜宣內外咸使聞知御覽五百九十九引三國典略為武成帝以三臺宮為大興聖寺詔為武成帝以三臺宮為大興聖寺詔門下皇居帝邑揆日瞻星仞雉有常几席斯在雖今古推移文質代變而成世作範義貴適時朕奄家四海作孚萬國當陽負扆深存庇氓濟下利物無忘懷抱昭仁訓俗不遺造次今臨嚮聽朝咸極崇廣宴息之所不乏溫華每謂為之者勞居之者逸至于離宮別館有時遊幸耳目所及聊可忘懷而乃千門洞啓萬柱周架上迫雲漢下臨雷雨巧極金銅麗殫珠璧眷然長想良非宿心三臺並列蕪穢自久天保之末經構甫興仍創棟宇規模宏博有司過實匠人逞功氓庶勞止縻費難量既非殿寢正所便為虛衛之地凝華生白經歷歲年不翦茅茨事頗逼下卑其宮室有可庶幾顧茲侈麗豈伊寧處自魏朝失政九域崩離人神無主實求明聖我太祖獻武皇帝握茲乾紀執斯地綱懸持日月嘯吒風雲紀忠貞以成務感靈徵而大造爰以克定之初躬圖道場之業神迹冥果理燭幽明朕嗣膺寶祚永惟嘉祉仰祗先志尚竦玄門思展聿修之重念歸喜捨之大肌膚匪吝國城何寶期濟率土至于圓極可以三臺宮為大興聖寺此處極土木之壯窮丹素之妍奇怪備于刻削光華異于圖彩顧使靈心肸蠁神物奔會真覺唯寂有感必通化為淨土廣延德衆心若琉璃法輪常轉灑甘露于大千照慈鐙于曠劫釋藏策五廣宏明集二十八上初學記二十三册命齊王九錫文册命齊王九錫文於戲敬聽朕命夫惟天為大列晷宿而垂象謂地蓋厚疏川嶽以阜物所以四時代序萬類駢羅庶品得性群形不夭然則皇王統曆深視高居拱默垂衣寄成師相此則夏伯殷尹竭其股肱周成漢昭無為而治頃者天下多難國命如旒則我建國之業將墜于地齊獻武王奮迅風雲大濟艱危爰翼朕躬國為再造經營庶土以至勤憂及文襄承構愈廣前業康邦夷難道格穹蒼王縱德應期千齡一出惟幾惟深乃神乃聖大崇霸德實廣相猷雖冥功妙實藐絶言象標聲示迹典禮宜宣今申後命其敬虛受王摶風初舉建旟上地庇民立政時雨滂流下識廉恥仁加水陸移風易俗自齊變魯此王之功也仍攝天臺總參戎律策出若神威行朔土引弓竄迹松塞無煙此又王之功也逮光統前緒持衡匡合華戎混一風海調夷日月光華天地清晏聲接響隨無思不偃此又王之功也逖矣炎方逋違正朔懷文耀武授略申規淮楚連城漼然桑落此又王之功也關峴襟帶跨躡蕭條腸胃之地嶽立鴟跱偏師才指渙同冰散此又王之功也晉熙之所險薄江雷迥隔聲教迷方未改命將鞠旅覆其巢穴威略風騰傾懾南海此又王之功也群蠻跋扈世絶南疆搖蕩邊垂亟為塵梗懷德畏威向風請順傾陬盡落其至如雲此又王之功也胡人別種延蔓山谷酋渠萬旅廣袤千里憑險不恭恣其桀黠有樂淳風相攜叩款粟帛之調王府充積此又王之功也茫茫涉海世敵諸華風行鳥逝倏來忽往既飲醇醪附同膠漆氈裘委仞奇獸銜尾此又王之功也秦川尚阻作我仇讎爰挹椒蘭飛書請好天動其衷辭卑禮厚區宇乂寧遐邇畢至此又王之功也江陰告禍民無適歸蕭宗子弟尚相投庇如鳥還山猶川赴海荊江十部俄而獻割乘此會也將混朱方此又王之功也天平地成率土咸茂禎符顯見史不停筆既連百木兼呈九尾素過秦雀蒼比周烏此又王之功也搜揚管庫衣冠獲序禮云樂云銷沈俱振輕徭徹賦矜獄寬刑大信外彰深仁遠洽此又王之功也王有安日下之大勳加以表光明之盛德宣贊洪猷以左右朕言昔旦奭外分毛畢入佐出內之任王宜總之人謀鬼謀兩儀協契錫命之行義申公道以王踐律蹈禮軌物蒼生圓首安志率心歸道是以錫王大路戎路各一玄牡二駟王深重民天唯本是務衣食之用榮辱所由是用錫王衮冕之服赤舄副焉王深廣惠和易調風化神祇且格功德可象是用錫王軒懸之樂六佾之舞王風聲振赫九域咸綏遠人率俾奔走委賮是用錫王朱戶以居王求賢選衆草萊以盡陳力就列罔非其人是用錫王納陛以登王英圖猛概抑揚千品毅然之節肅是非違是用錫王武賁之士三百人王興亡所繫制極幽顯糾行天討罪人咸得是用錫王鈇鉞各一王鷹揚豹變實扶下土狼顧鴟張罔不彈射是用錫王彤弓一彤矢百盧弓十盧矢千王孝悌之至通于神明率民興行感達區宇是用錫王秬鬯一卣圭瓚副焉往欽哉其祗順往册保弼皇家用終爾休德對揚我太祖之顯命北齊書文宣紀禪位册禪位册咨爾相國齊王夫氣分形化物繫君長皇王遞興人非一姓昔放勛馭世沈璧屬子重華握曆持衡擁璇所以英賢茂實昭晰千古豈盛衰有運興廢在時知命不得不授畏天不可不受是故漢劉告否當途順民曹曆不永金行納禪此皆重規襲矩率由舊章者也我祖宗光宅混一萬宇迄于正光之末姦孽乘權厥政多僻九域離蕩永安運窮人靈殄瘁群逆滔天割裂四海國土臣民行非魏有齊獻武王應期授手鳳舉龍驤舉廢極以立天扶傾柱而鎮地翦滅黎毒匡我墜曆有大德于魏室被博利于蒼生及文襄繼軌誕光前業內剿凶權外摧侵叛遐邇肅晏功格上玄王神祇協德舟梁一世體文昭武追變窮微自舉迹藩旟頌歌總集入統機衡風猷弘遠及大承世業扶國昌家相德日躋霸風愈邈威靈斯暢則荒遠奔馳聲略所播而鄰敵順款以富有之資運英特之氣顧眄之間無思不服圖諜潛蘊千祀彰明嘉禎幽祕一朝紛委以表代德之期用啓興邦之迹蒼蒼在上照臨不遠朕以虛昧猶未逡巡靜言愧之坐而待旦且時來運往媯舜不暇以當陽世革命改伯禹不容于北面況于寡薄而可踟蹰是以仰協穹昊俯從百姓敬以帝位式授于王天祿永終大命格矣於戲其祗承曆數允執其中對揚天休斯年千萬豈不盛歟北齊書文宣紀太子監國冬會議太子監國冬會議去天保初皇太子監國冬會群官于西林園都亭坐從東面義取于嚮中宮殿臺故也二年于宮冬會坐乃東面收竊以為疑前者遂有別議議者同之邢尚書以前定東面之議復申本懷此乃國之大禮無容不盡所見收以為太子東宮位在于震長子之義也案易八卦正位嚮中皇太子今居北城于宮殿為東北南面而坐于義為背也前者立議據東宮為本又案東宮舊事太子宴會多以西面為禮此又成證非徒言也不言太子常無東西二面之坐但用之有所至如西園東面所不疑也未知君臣車服有同異之議何為而發就如所云但知禮有同者不可令異不知禮有異者不可令同苟別君臣同異之禮恐重紙纍札書不盡也隋書禮儀志四通典七十一上魏書十志啓上魏書十志啓臣收等啓昔子長命世偉才孟堅冠時特秀憲章前哲裁勒墳史紀傳之間申以書志緒言餘迹可得而聞叔峻刪緝後劉紹統削撰季漢十志實範遷固表蓋闕焉曹氏一代之籍了無具體典午終世之筆罕云周洽假復事播四夷盜聽間有小道俗言要奇好異考之雅舊咸乖實録自永嘉喪圮中原淆然偏偽小書殆無可取魏有天下跨蹤前載順末克讓善始令終陛下極聖窮神奉天屈己顧眄百王指掌萬世深存有魏撫運之業永念神州人倫之緒臣等肅奉明詔刊著魏籍編紀次傳備聞天旨竊謂志之為用網羅遺逸載紀不可附傳非宜理切必在甄明事重尤應標著搜獵上下總括代終置之衆篇之後一統天人之迹褊心末識輒在于此是以晚始撰録彌歷炎涼采舊增新今乃斷筆時移世易理不刻船登閣含毫論敘殊致河溝往時之切釋老當今之重藝文前志可尋官氏魏代之急去彼取此敢率愚心謹成十志二十卷請續于傳末并前例目合一百三十一卷臣等妨官秉筆迄無可采塵黷旒冕墮深冰谷謹啓魏書一百五與李德林書論齊書起元事與李德林書論齊書起元事前者議文總諸事意小如混漫難可領解今便隨事條列幸為留懷細加推逐凡言或者皆是敵人之議既聞人説因而探論耳隋書李德林傳重遺李德林書惠示二事感佩殊深以魯公諸侯之事昨小為疑息姑不書即位舜禹亦不言即位息姑雖攝尚得書元舜禹之攝稱元理也周公居攝乃云一年救亂似不稱元自無大傳不得尋討一之與元其事何別更有所見幸請論之同上為侯景叛移梁朝文夫化成萬物分界九道紀之以山河照之以日月方足圓首含氣呈形咸總之于聖人畢會之以朝市皇魏應銜甲之祕圖納封金之寶命萬方為宅四海為家卜世靈長將踰八百天壤之間朝不別焉唯夫三江五湖九蠻百濮其地如掌人鳥未分瞻星昧環拱之方託水迷朝宗之義積蠅為衆長蛇稱長石田無菽粟之用衆人非聲教所孚是以年歷三偽棄而不有豈力不足蓋所未徵而陸梁塗泥時軼疆鄙天討所遺理存惡殺自二紀及茲中原多故未清區宇文武兼勤偃伯歸戰有懷勞止將令動植俱仰堯心遂冠蓋括途象胥提告推誠蹶然類識王道授衣禮節拜首歸仁舞戚所以為高止戈故能稱大方知夙沙交臂不待兵車有苗納款未勞征伐而庸夫為善希能令終狂人克念更知徒語聞利無匹夫之信好虐有助鬼之心白頭為賊曾莫自揆嘉文浮功甘于苟得罔顧榆次之禍詎識江浦之禽侯景一豎微蔑民斯下矣人倫士操本自不倫直以少從羈勒頗習趨走叨忝名器事出爾朱藏情諂笑唯利是視義兵同舉群胡覆族雖狐祭首丘事非小人而忘恩背本景為先至不義不信自此可知但丁公之戮時有未可也大澤深山龍蛇並育遂容其悔非棄其瑕穢任以將率授以兵符庶其被鞍銜鍊盡力馳驟指蹤投緤駑兔或擒而弱才負重折足是慮置之不爭之地虛出韓鄭之間曾無戰伐之勤可言摧陷之績歲往年徂率無可紀而腹心群小信納逋亡劫奪行道侵掠民庶流聲遠聞王法有典驄馬將出朱筆且行自貽伊戚了不知咎盜憎主人乃圖逆節拔本塞源委身賊虜逼脅居民翻蕩城池義手曲躬千里唯諾殘賊相依欣同鱗水寵以大位屬以東方外曰臣主內深骨肉安危契闊約以死生拯其鼎鑊之命全其齏粉之福時不暇浹翻然易慮還相掩擊事劇仇讎反覆剽獲莫非此類至于老母暮倚少弟升岡妻望行夫子號出父食毛之屬可為痛心哉景忽之如草芥棄之如塵垢任其斫截之誅安其烹斬之痛放麑食子有以可親觀臧窮否恥其並主獸心人面華裔同讎歸家懼執法之刑赴賊反噬臍之釁首領無地進退數窮遂騁邪説自託左右苟有君子義均逐雀而彼方上下樂禍好亂叛竊之豎獲毒之人圖浮芥之小利忘丘山之大禍乃崇飾土偶被以玄黃馳馬高蓋載鼷為重委以專征施其爪角驅逼子姓率我叛亡逼厭虐之侶鞠苦役之衆蟻攢蚋集侵竊邊鄙恤患分災本不要于違僻違衆悖禮蓋神明之所誅皇帝垂旒華土則天而動卷覆三古懷佩百王掌握中道崇基增構殊塗同會百慮一歸中外禔福戎華俱庇持秋霜夏震之威以拔山超海之力顧指則風雲總至回眸而山嶽削平雖復旗鼓所臨有征無戰猶以師出而服辱在我世所務者息民所存者文德豈復以擒將威敵漂杵溺驂為功于一時示武于千載且天生五材有聞前古禍非我貽其得已乎遂置壇命將持柯畢禮引營就道分途競馳批熊舉輪之士翹關扛鼎之卒被組橫矛執殳挺劍龍駒並躍驥子千群沸䀨天壤蒸鬱雲霄一朝指揮倏忽千里候騎羅絡聊逞前驅天兵之鼓未鳴衆軍之旗詎接而荊揚烏合一朝崩解塞州滿野馘耳截鼻以千萬計不可勝數宗親節將咸見擒束委命軍吏憂在釁鼓楚兵吳甲積若山丘青鵲赤烏噎流斷岸千金之貴為我資焉痛辱可哀其利安在覆師喪旅禍本可尋方之噬臍悔之靡及皆侯景叛戾虛相陷誘指成提挈之舉終無掎角之勢景棄本趨末背國違鄉部下數千屈逼羅網離親懷土一日三秋拘網立匏朝不謀夕豈能搖足東上遠赴彭城天奪彼魄信納虛詭使蕭明貴孫面縛于徐泗景為凶藪逡巡而坐觀託人七尺之身居人成敗之地急病讓醫固若此也兩端自見故態未除今知東南滌蕩睢潼清復梁之喪師單輪不返擊援之期終當無日勢窮路盡憂在滅亡事留變生將謀及已且彼軍殲殄江淮屠酷禍源釁迹景實為之上懼金陵君長致請設之責下恐荊吳子弟洗父兄之冤愚小猜驚將興異計乘專任之機藉方面之重必當招結傖楚扇合無賴內自封植外絶防禦因見信而類起出不疑以竊發事比疾雷理同激矢上或憑陵乘疾專擅縱橫下則鴟峙淮肥覬覦叛換老疾姦回不虛然也而彼土區區厚加崇納置之襟帶之方處以藩籬之所費金帛于烈火罄酒漿于漏卮非乘景虛聲委其實用夫量材授任必原其始考行責成當存其大景豺聲蜂目之首狼心狐魅之徒義無父子棄同即異捐親背德于我尚反目而去在梁則何施可懷且我重傷心尾大不掉魚脫于淵義彰老氏而假威凶險授柄姦回欲求肝膽之誠更啓危亡之兆固智者不為迷者遂去若抽薪止沸翦草除根壺首囊頭叉手械足返國姦于司敗歸侵地于玄武非直惡之在今天道人事實棄無禮苟達之者其長世何若悔非知罪恭承德音且欲飛驛合符班師凱入悠悠水鄉有救其死若乃執飾非之辨固遂過之失便當盡常勝之戰極必取之攻飛江南渡深山將恐削壤卑名雖頓顙而不獲亡宗滅廟望喬木而可悲昔田假英人于期壯士窮而歸我許以入懷景竦悖狗子攪亂四國庸可紓難棄若孤雛何足戀戀于亂臣勤勤于賊子也王者之威心厲如霜雪信同寒暑言猶麗天移至深念變通熟量可否幸思大雅無貽後悔文苑英華六百五十收以子姪少年申以戒厲著枕中篇其詞曰枕中篇吾曾覽管子之書其言曰任之重者莫如身途之畏者莫如口期之遠者莫如年以重任行畏途至遠期惟君子為能及矣追而味之喟然長息若夫嶽立為重有潛戴而不傾山藏稱固亦趨負而弗停呂梁獨浚能行歌而匪惕焦原作險或躋踵而不驚九陔方集故渺然而迅舉五紀當定想窅乎而上征苟任重也有度則任之而愈固乘危也有術蓋乘之而靡恤彼期遠而能通果應之而可必豈神理之獨爾亦人事其如一嗚呼處天壤之間勞死生之地攻之以嗜欲牽之以名利粱肉不期而共臻珠玉無足而俱致于是乎驕奢仍作危亡旋至然則上知大賢唯幾唯哲或出或處不常其節其舒也濟世成務其卷也聲銷迹滅玉帛子女椒蘭律呂諂諛無所先稱肉度骨膏脣挑舌怨惡莫之前勳名共山河同久志業與金石比堅斯蓋厚棟不橈遊刃砉然逮于厥德不常喪其金璞馳騖人世鼓動流俗挾湯日而謂寒包溪壑而未足源不清而流濁表不端而影曲嗟乎膠漆詎堅寒暑甚促反利而成害化榮而就辱欣戚更來得喪仍續至有身禦魑魅魂沈狴獄詎非足力不強迷在當局孰可謂車戒前傾人師先覺聞諸君子雅道之士遊遨經術猒飫文史筆有奇鋒談有勝理孝悌之至神明通矣審道而行量路而止自我及物先人後己情無繫于榮悴心靡滯于慍喜不養望于丘壑不待價于城市言行相顧慎終猶始有一于斯鬱為羽儀恪居展事知無不為或左或右則髦士攸宜無悔無吝故高而不危異乎勇進忘退苟得患失射千金之産邀萬鍾之秩投烈風之門趨炎火之室載蹶而墜其貽宴或蹲乃喪其貞吉可不畏歟可不戒歟門有倚禍事不可不密牆有伏寇言不可或失宜諦其言宜端其行言之不善行之不正鬼執強梁人囚徑廷幽奪其魄明夭其命不服非法不行非道公鼎為己信私玉非身寶過涅為紺踰藍作青持繩視直置水觀平時然後取未若無欲知止知足庶免于辱是以為必察其機舉必慎于微知幾慮微斯亡則稀既察且慎福祿攸歸昔蘧瑗識四十九非顏子幾三月不違跬步無已至于千里覆一簣進及于萬仞故云行遠自邇登高自卑可大可久與世推移月滿如規後夜則虧槿榮于枝望暮而萎夫奚益而非損孰有損而不害益不欲多利不欲大唯居德者畏其甚體真者懼其大道尊則群謗集任重而衆怨會其達也則尼父棲遑其忠也而周公狼狽無曰人之我狹在我不可而覆無曰人之我厚在我不可而咎如山之大無不有也如谷之虛無不受也能剛能柔重可負也能信能順險可走也能知能愚期可久也周廟之人三緘其口漏卮在前攲器留後俾諸來裔傳之坐右北齊書魏收傳庫狄干碑序北史八十三祭荊州刺史陰道方文維太昌元年十二月庚申朔越十二日辛未友人巨鹿魏收謹以清酌少牢之饌敬祭于荊州刺史陰君之靈嗚呼哀哉惟君世載不殞英聲在茲風流有屬自爾弘之孝為行本忠實身基既言斯立罄禮窮詩器則清賞才惟英博於暢風雷蕭條丘壑顧言朝市忘懷淡薄比契沈冥均情寂寞往塵守官及爾同僚塤篪合韻琴瑟俱調丹墀踵武清道齊鑣迹淪間曠心共津濠乃眷平生相欣多趨殷勤宴喜流連辭賦溘矣不追長違世務詠歌徒在音徽空樹昔猶肢體與子裘裳今其往也生死殊方形骸何促天地何長申茲沃酹贈以哀傷嗚呼哀哉繕寫三部一切經願文繕寫三部一切經願文三有分區四生稟性共遊火宅俱淪欲海所以法王當洲渚之運覺者應車乘之期導彼沈迷歸茲勝地自寶雲西映法河東瀉甘露橫流隨風感授皇家統天尊道崇法拔群品于有待驅衆生于不二所以刻檀作繢搆石雕金遍于萬國塵沙數等復詔司存有事緇素精誠踰于皮骨句偈盡于龍官金口所宣總勒繕寫各有三部合若干卷用此功德心若虛空以平等施無思不洽藉我願力同登上果廣宏明集二十三
