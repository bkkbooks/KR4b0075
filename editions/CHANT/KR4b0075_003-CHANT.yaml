body:
  text: 附錄七月七日登舜山詩述職無風政復路阻山河還思麾蓋日留謝此山阿酉陽雜俎十二論敘裴伯茂詩臨風想玄度對酒思公榮魏書裴伯茂傳大射賦詩尺書徵建鄴折簡召長安北史魏收傳為齊即位告天文皇帝臣諱敢用玄牡昭告於皇皇后帝否泰相沿廢興迭用至道無親應運斯輔上覽唐虞下稽魏晉莫不先天揖讓考歷歸終魏氏多難年將三十孝昌已後內外去之世道橫流蒼生塗炭賴我獻武拯其將溺三建元首再立宗祧掃絕群凶芟夷姦宄德被黔黎勳光宇宙文襄嗣武克搆鴻基功浹寰宇威稜海外窮髮懷音西寇納款青丘保候丹穴來庭扶翼危機重匡頹運是則有大造於魏室也魏帝以卜世告終上靈厭德欽若昊天允歸大命以禪於臣諱夫四海至公天下為一總民宰世樹之以君既川嶽啟符人神效祉群公卿士八方兆庶僉曰皇極乃顧於上魏朝推進於下天位不可以暫虛遂逼群議恭膺大典猥以寡薄託於兆民之上雖天威在顏咫尺無遠循躬自省實懷祗愓敬簡元辰升壇受禪肆類上帝以荅萬國之心永隆嘉祉保祐有齊以被於無窮之祚為東魏檄梁文為東魏檄梁文觀夫辰象麗天山岳鎮地方以類聚物以群分建之以邦國樹之以君長日月於是莫二宇宙所以總一雖五運相推百王革命此道之行孰之能改而皇家承統光配彼天義洽幽明化周動植崇文德以來遠修禮讓以止訟舞干戚於兩階執玉帛於萬國玄功潛運至德旁通百姓日用而不知兆民受賜而無迹唯彼吳越獨阻聲教匪民之咎責有由焉而元首懷止戈之心上宰薄兵車之會遂解縶南冠喻以好睦舟車遵泝川陸同光亭徼息犇走之勞屯戍無逼卒之變雖嘉謨長筭爰自我始而罷兵息民彼獲其利侯景豎子本無事業乃枉道於人間遂乾沒於世上鳴吠於爾朱之門鎮守於普泰之日曾無為主之識詎有挈瓶之智既而投命義旗歸身幕府殊異雍齒有類丁公時逢寬政得免大戮棄其瑕滓收其力用預在行伍參跡驅馳及秦隴逋誅每事經略以河南是空虛之地漢陽非兵戰之衝薄存犄角聊示旗鼓豈資實效寄以遊聲軍機催勒蓋維景任總兵統旅則有司存而愚褊有積驕憤遂甚屢犯軍紀自生疑貳禍心潛搆翻成亂階負恩棄德罔恤天討不義不昵厚而必顛委慈母似脫屣棄寵弟如遺芥龍鍾稚子痛苦成行孌彼諸姬破亡為伍滅伯春之婉轉慕姜兒之爽言不與狼虎同仁而共豺貍等惡及遠託關隴依憑姦異逆主定君臣之分賊臣結兄弟之親解其倒懸仰人鼻息豈曰無恩終成難養俄而易慮躬擐干戈釁暴惡盈側首無託以金陵逋逃之藪江南統御之地甘辭卑體進熟圖身讒言浮說抑可知矣叛豎投命豈將擇音而偽朝大小幸災忘義主荒於上臣蔽於下逐雀去草曾不是圖竊寶叛邑椒蘭比好人而無禮其能國乎亦既失信不亡何待今帝道休明皇猷允塞四民樂業百靈效祉故丞相材標國楨道潤時雨義冠伊霍勳蓋桓文大君立德世功世祿作民舟楫為國棟梁內外齊心上下同德蛟騰虎嘯風生雲起麾日則車懸轉舍排山則龍門洞開吞雲夢於胸中運天下於掌內雖有賊臣去國亡卒出境何異一毛之落牛體雙鳧之飛海曲彼既連結姦惡斷絕鄰好追兵保境縱盜侵國蓋物無定方事無常勢或乘利而受害或因得而更失是以吳侵齊境遂致勾踐之師趙納韓地終有長平之役矧乃鞭撻疲民侵軼徐部築壘擁川捨信邀利此而可忍孰不可懷是以援枹乘麾之將投石拔距之士深銜偽主信納亡叛含怒作色如赴私讎意存涉血義不旋踵攻戰之利實若有神徵兵聚眾依山傍水舉螳蜋之斧被蛣蜣之甲當窮轍以待輪坐積薪而候燎及其鋒刃繞交埃塵且接便已亡戟棄戈土崩瓦解貞陽以從子之親為戎首之任非獨力屈道窮亦將無路還蜀兼亦挾子垂翅俱在籠樊將士以昧禍之心為助亂之事皆掬指舟中披甲鼓下同宗異姓纍纍相望曲直既殊強弱不等父出子孤自取其敗違卜愎諫何以辭責雖復貪利苟得背同即異獲一人而失一國見黃雀而忘深穽食鉤吻以療饑飲鴆毒以救渴智者所不為仁者所不向誠既往之難逮猶將來之可追景以鄙俚之夫遭風雲之會位登三事邑啟萬家揣身量分久當止足而周章向背離披不已夫豈徒然意亦可見彼乃示之以利器誨之以慢藏使其勢得容姦令其時堪乘便既南風不競天亡有徵老賊姦謀將復作矣然則摧堅強者難為功拉枯朽者易為力計其雖非孫吳猛將燕趙精兵猶是久涉行陣曾習軍旅豈同輕剽之師不比危脆之眾拒此則作氣不足攻彼則為勢有餘恐尾大於身踵麤於股倔強不掉狼戾難馴呼之則反速而釁小不徵則叛遲而禍大會應遙望廷尉不肯為臣自據淮南亦欲稱帝但恐楚國亡猿禍延林木城門失火殃及池魚橫使漢江士子荊揚人物死亡矢石之下夭折露霧之中彼梁主操行無聞輕險有素工用其短以少為多反覆山淵顛倒冠屨射雀論功盪舟稱力年既老矣耄又及之政荒民流禮崩樂壞改換朝章變易官品雖世異漢朝而事同新室加以用捨乖方立廢失所矯情動眾飾智驚愚毒螫滿懷妄敦戒業躁競盈胸謬治清淨內恣鴟靡外逞殘賊人人厭苦家家思亂災異降於上怨讟興於下履霜有漸堅冰且至恃浮躁之風俗任輕薄之子孫朋黨路開兵權在外必將禍生骨肉難起腹心強弩衝城長戟指闕徒探雀鷇無救府藏之虛空請熊蹯詎延晷刻之命外崩中潰今實其時鷸蚌相危我乘其弊方使高旗舒斾長轂啟行迅騎追風精甲耀日四七竝列百萬為群風飄雲動星羅海運以此赴敵何敵不摧以此攻城何城不陷猶為岸上之虎當作水中之龍以轉石之形為破竹之勢將使鍾山渡江青蓋入洛荊棘生建業之宮麋鹿遊姑蘇之館但恐兵車之所轥轢劍騎之所蹈踐杞梓於焉傾折竹箭以此摧殘若吳之王孫蜀之公子順時以動見機而作面縛銜璧肉袒牽羊歸款軍門委命下吏當使焚櫬而出拂席相待必以楚材將為晉用固乃喜得異度實自利獲士衡士龍即授客卿之族特加驃騎之號斯蓋壯士封侯之日丈夫立節之秋冬冰可折時不再來先事預懷有如皎日王侯無種工拙在人凡百君子勉求多福若不改迷坐待淪沒一旦暴骨草莽流血成川猶且不悟噬臍何及故宣往意馳此簡書檄之到彼咸共申省此作是杜弼所製據藝文稱魏收作今姑存之
