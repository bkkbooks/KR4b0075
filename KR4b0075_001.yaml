body:
  text: 卷一美女篇二首楚襄遊夢去陳思朝洛歸參差結旌斾掩靄頓驂騑變化看臺曲駭散屬川沂仍令賦神女俄聞要虙妃照梁何足豔升霞反奮飛可言不可見言是復言非樂府詩集六十三詩紀百十我帝更朝衣擅寵無論賤入愛不嫌微智瓊非俗物羅敷本自稀居然陋西子定可比南威新吳何為誤舊鄭果難依甘言誠易污得失定因機無憎藥英妬心賞易侵違同上永世樂綺窗斜影入上客酒須添翠羽方開美鉛華汗不霑關門今可下落珥不相嫌樂府詩集七十五詩紀百十棹歌行雪溜添春浦花水足新流桃發武陵岸柳拂武昌樓文苑英華二百三樂府詩集四十詩紀百十挾琴歌挾琴歌春風宛轉入曲房兼送小苑百花香白馬金鞍去未返紅妝玉筯下成行樂府詩集八十六詩紀百十後園宴樂束馬輕燕外獵雉陋秦中朝車轉夜轂仁旗指旦風式宴臨平圃展衛寫屠穹積崖疑造化導水逼神功樹靜歸煙合簾疏反照通一逢堯舜日未假北山叢文苑英華二百十四詩紀百十喜雨霞暉染刻楝礎潤上雕楹神山千葉照仙草百花榮瀉溜高齋響添池曲岸平滴下如珠落波回類璧成氣調登萬里年和欣百靈定知丹甑出何須銅雀鳴文苑英華百五十三詩紀百十看柳上鵲背歲心能識登春巢自成立枯隨雨霽依枝須月明疑是雕籠出當由抵玉驚間關拂條軟回復振毛輕何獨離婁意傍人但未聽初學記三十文苑英華三百二十八詩紀百十晦日泛舟應詔裊裊春枝弱關關新鳥呼棹唱忽逶迤菱歌時顧慕睿賞芳月色宴言忘日暮遊豫慰人心照臨康國步類聚四初學記四古今歲時雜詠九文苑英華百七十二御覽三十詩紀百十月下秋宴此夕甘言宴月照露方塗使星疑向蜀劍氣不關吳良交契金水上客慰萱蘇何必應劉輩還來遊鄴都初學記十四文苑英華二百十四詩紀百十五日麥涼殊未畢蜩鳴早欲聞喧林尚黃鳥浮天已白雲辟兵書鬼字神印題靈文因想蒼梧郡茲日祀東君初學記四文苑英華百五十七萬花谷後四詩紀百十庭柏古松圖偃蓋新柏寫爐峰凌寒翠不奪迎喧緑更濃茹葉輕沈體咀實化衰容將使中臺麝違山能見從初學記二十八文苑英華三百二十四詩紀百十蠟節蠟節凝寒迫清祀有酒宴嘉平宿心何所道藉此慰中情初學記四詩紀百十
